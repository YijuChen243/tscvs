<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台東高商檢定雲端點餐系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .category-card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 1.5rem; overflow: hidden; border: 1px solid #e2e8f0; }
        .category-header { background: #1e3a8a; color: white; padding: 12px 16px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .price-btn { cursor: pointer; border: 1px solid #cbd5e1; border-radius: 8px; padding: 6px 8px; text-align: center; transition: all 0.2s; background: white; min-width: 60px; font-size: 0.85rem; user-select: none; }
        .price-btn:hover { background: #eff6ff; border-color: #2563eb; color: #1e40af; transform: translateY(-1px); }
        .sticky-nav { position: sticky; top: 0; z-index: 40; background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; }
        .tab-active { color: #1e3a8a; border-bottom: 3px solid #1e3a8a; font-weight: 900; }
        #cart-modal, #login-modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
        .status-badge { padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: bold; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-cooking { background: #dcfce7; color: #166534; }
        .status-done { background: #f1f5f9; color: #64748b; }
        .stat-row:nth-child(even) { background-color: #f8fafc; }
        .selected-btn { background-color: #1e40af !important; color: #ffffff !important; border-color: #1e40af !important; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .input-error { border-color: #ef4444 !important; animation: shake 0.2s ease-in-out 0s 2; background-color: #fef2f2; }
        
        /* 列印專用樣式 */
        @media print {
            body { background-color: #fff !important; padding: 0 !important; margin: 0; }
            header, nav, main, footer, #cart-modal, #login-modal { display: none !important; }
            #print-area { display: block !important; }
            @page { size: A4; margin: 15mm; }
            /* 防止訂單在跨頁時被從中切斷 */
            .print-order-group { page-break-inside: avoid; break-inside: avoid; }
        }
    </style>
</head>

        <p class="text-gray-400 text-xs tracking-widest mt-1">檢定點餐專用</p>
    </header>

    <nav class="sticky-nav flex justify-around mb-2">
        <button id="nav-order" onclick="showView('order')" class="flex-1 py-4 tab-active">🍴 線上點餐</button>
        <button id="nav-admin" onclick="showView('admin')" class="flex-1 py-4 text-gray-400">📊 學校後台統計管理</button>
    </nav>

    <!-- 點餐頁面 -->
    <main class="max-w-2xl mx-auto px-4 py-6" id="order-view">
        <section class="category-card">
            <div class="category-header">🍱 主廚拼盤系列</div>
            <div id="platter-list" class="p-4 space-y-4 divide-y"></div>
        </section>

        <section class="category-card">
            <div class="category-header">🍝 麵食系列</div>
            <div id="noodle-list" class="p-4 space-y-4 divide-y"></div>
        </section>

        <section class="category-card">
            <div class="category-header">🍔 漢堡與菠蘿系列</div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50 border-b">
                        <tr><th class="p-3 text-left text-gray-500">品項名稱</th><th class="p-3 text-center text-xs">漢堡</th><th class="p-3 text-center text-xs">菠蘿</th></tr>
                    </thead>
                    <tbody id="burger-list" class="divide-y"></tbody>
                </table>
            </div>
        </section>

        <section class="category-card">
            <div class="category-header">🍞 方型吐司 & 山型鮮奶吐司</div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50 border-b">
                        <tr><th class="p-3 text-left text-gray-500">口味</th><th class="p-2 text-center text-xs">方型</th><th class="p-2 text-center text-xs">山型</th></tr>
                    </thead>
                    <tbody id="toast-list" class="divide-y"></tbody>
                </table>
            </div>
        </section>

        <section class="category-card">
            <div class="category-header">🧇 果醬系列</div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50 border-b">
                        <tr><th class="p-3 text-left text-gray-500">口味</th><th class="p-2 text-center text-xs">方型吐司</th><th class="p-2 text-center text-xs">可頌</th><th class="p-2 text-center text-xs">鬆餅</th></tr>
                    </thead>
                    <tbody id="jam-list" class="divide-y"></tbody>
                </table>
            </div>
        </section>

        <section class="category-card">
            <div class="category-header">🍳 蛋餅系列</div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50 border-b">
                        <tr><th class="p-3 text-left text-gray-500">口味</th><th class="p-2 text-center text-xs">一般</th><th class="p-2 text-center text-xs">特酥(+10)</th></tr>
                    </thead>
                    <tbody id="egg-list" class="divide-y"></tbody>
                </table>
            </div>
        </section>

        <section class="category-card">
            <div class="category-header">🍟 點心與單點</div>
            <div id="snack-list" class="p-4 grid grid-cols-2 gap-4"></div>
        </section>

        <section class="category-card">
            <div class="category-header">🥤 飲品系列 (冷/熱飲)</div>
            <div id="drink-list" class="p-4 space-y-4"></div>
        </section>
    </main>

    <!-- 下單成功頁面 -->

    <!-- 管理頁面 -->

            </div>
        </div>
    </footer>

                { name: '豆漿紅茶', m: 25, l: 30, xl: 35 }, { name: '紅茶牛奶', l: 40, xl: 45 },
                { name: '綠茶牛奶', l: 40, xl: 45 }, { name: '焦糖奶茶', l: 40, xl: 50 },
                { name: '研磨美式咖啡', m: 30, xl: 49 }, { name: '研磨拿鐵咖啡', m: 40, xl: 69 },
                { name: '焦糖拿鐵咖啡', m: 40, xl: 69 }
            ]
        };

        let cart = {};
        let allOrders = [];
        let isAdminAuthenticated = false;

        window.initMenu = () => {
            const setHtml = (id, html) => document.getElementById(id).innerHTML = html;

            setHtml('platter-list', menuData.platters.map(p => `
                <div class="pt-4 flex justify-between items-center">
                    <div><div class="font-bold text-slate-800">${p.name}</div><div class="text-[10px] text-slate-400">${p.desc}</div></div>
                    <div class="price-btn text-blue-800 font-black" data-name="${p.name}" onclick="toggleItem('${p.name}',${p.price})">$${p.price}</div>
                </div>
            `).join(''));

            setHtml('noodle-list', menuData.noodles.map(n => `
                <div class="pt-4 flex justify-between items-center">
                    <div class="font-bold text-slate-800">${n.name}</div>
                    <div class="price-btn text-blue-800 font-black" data-name="${n.name}" onclick="toggleItem('${n.name}',${n.price})">$${n.price}</div>
                </div>
            `).join(''));

            setHtml('burger-list', menuData.burgers.map(b => `
                <tr class="divide-x divide-gray-50">
                    <td class="p-3 text-left font-medium">${b.name}</td>
                    <td class="p-2"><div class="flex justify-center">${b.p1 ? `<div class="price-btn" data-name="${b.name}(漢)" onclick="toggleItem('${b.name}(漢)',${b.p1})">$${b.p1}</div>` : '-'}</div></td>
                    <td class="p-2"><div class="flex justify-center">${b.p2 ? `<div class="price-btn" data-name="${b.name}(菠)" onclick="toggleItem('${b.name}(菠)',${b.p2})">$${b.p2}</div>` : '-'}</div></td>
                </tr>
            `).join(''));

            setHtml('toast-list', menuData.toasts.map(t => `
                <tr class="divide-x divide-gray-50">
                    <td class="p-3 text-left font-medium">${t.name}</td>
                    <td class="p-2"><div class="flex justify-center"><div class="price-btn" data-name="${t.name}(方)" onclick="toggleItem('${t.name}(方)',${t.p1})">$${t.p1}</div></div></td>
                    <td class="p-2"><div class="flex justify-center"><div class="price-btn" data-name="${t.name}(山)" onclick="toggleItem('${t.name}(山)',${t.p2})">$${t.p2}</div></div></td>
                </tr>
            `).join(''));

            setHtml('jam-list', menuData.jams.map(j => `
                <tr class="divide-x divide-gray-50">
                    <td class="p-3 text-left font-medium">${j.f}</td>
                    <td class="p-2 text-center"><div class="price-btn" data-name="${j.f}吐司" onclick="toggleItem('${j.f}吐司',${j.t})">${j.t}</div></td>
                    <td class="p-2 text-center"><div class="price-btn" data-name="${j.f}可頌" onclick="toggleItem('${j.f}可頌',${j.c})">${j.c}</div></td>
                    <td class="p-2 text-center"><div class="price-btn" data-name="${j.f}鬆餅" onclick="toggleItem('${j.f}鬆餅',${j.w})">${j.w}</div></td>
                </tr>
            `).join(''));

            setHtml('egg-list', menuData.eggs.map(e => `
                <tr class="divide-x divide-gray-50">
                    <td class="p-3 text-left font-medium">${e.name}</td>
                    <td class="p-2"><div class="flex justify-center"><div class="price-btn" data-name="${e.name}(一般)" onclick="toggleItem('${e.name}(一般)',${e.p})">$${e.p}</div></div></td>
                    <td class="p-2"><div class="flex justify-center"><div class="price-btn" data-name="${e.name}(特酥)" onclick="toggleItem('${e.name}(特酥)',${e.p+10})">$${e.p+10}</div></div></td>
                </tr>
            `).join(''));

            setHtml('snack-list', menuData.snacks.map(s => `
                <div class="flex justify-between items-center p-3 border rounded-xl bg-slate-50/50">
                    <span class="text-xs font-bold text-slate-600">${s.name}</span>
                    <div class="price-btn text-blue-700 font-bold" data-name="${s.name}" onclick="toggleItem('${s.name}',${s.price})">$${s.price}</div>
                </div>
            `).join(''));

            setHtml('drink-list', menuData.drinks.map(dr => `
                <div class="pb-4 border-b border-gray-100 last:border-0 last:pb-0">
                    <div class="font-bold text-slate-700 text-sm mb-3">${dr.name}</div>
                    <div class="space-y-2">
                        ${dr.m ? `
                        <div class="flex gap-2">
                            <div class="price-btn flex-1 text-blue-600 bg-blue-50/30 border-blue-100 hover:bg-blue-50" data-name="${dr.name}(M/冷)" onclick="toggleItem('${dr.name}(M/冷)',${dr.m})">🧊 M 冷 $${dr.m}</div>
                            <div class="price-btn flex-1 text-red-500 bg-red-50/30 border-red-100 hover:bg-red-50" data-name="${dr.name}(M/熱)" onclick="toggleItem('${dr.name}(M/熱)',${dr.m})">♨️ M 熱 $${dr.m}</div>
                        </div>` : ''}
                        ${dr.l ? `
                        <div class="flex gap-2">
                            <div class="price-btn flex-1 text-blue-600 bg-blue-50/30 border-blue-100 hover:bg-blue-50" data-name="${dr.name}(L/冷)" onclick="toggleItem('${dr.name}(L/冷)',${dr.l})">🧊 L 冷 $${dr.l}</div>
                            <div class="price-btn flex-1 text-red-500 bg-red-50/30 border-red-100 hover:bg-red-50" data-name="${dr.name}(L/熱)" onclick="toggleItem('${dr.name}(L/熱)',${dr.l})">♨️ L 熱 $${dr.l}</div>
                        </div>` : ''}
                        ${dr.xl ? `
                        <div class="flex gap-2">
                            <div class="price-btn flex-1 text-blue-600 bg-blue-50/30 border-blue-100 hover:bg-blue-50" data-name="${dr.name}(XL/冷)" onclick="toggleItem('${dr.name}(XL/冷)',${dr.xl})">🧊 XL 冷 $${dr.xl}</div>
                            <div class="price-btn flex-1 text-red-500 bg-red-50/30 border-red-100 hover:bg-red-50" data-name="${dr.name}(XL/熱)" onclick="toggleItem('${dr.name}(XL/熱)',${dr.xl})">♨️ XL 熱 $${dr.xl}</div>
                        </div>` : ''}
                    </div>
                </div>
            `).join(''));
        };

        window.toggleItem = (n, p) => {
            if(cart[n]) {
                delete cart[n]; 
            } else {
                cart[n] = { price: p, count: 1 }; 
            }
            updateCartUI();
        };

        window.changeCount = (n, delta) => {
            cart[n].count += delta;
            if(cart[n].count <= 0) delete cart[n];
            updateCartUI();
        };

        function updateCartUI() {
            let total = 0;
            let count = 0;
            const details = document.getElementById('cart-details');
            details.innerHTML = '';
            for(const [n, info] of Object.entries(cart)) {
                total += info.price * info.count;
                count += info.count;
                details.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded-2xl border border-gray-100">
                        <div class="flex-1">
                            <div class="font-black text-sm text-slate-800">${n}</div>
                            <div class="text-xs text-blue-600 font-bold">$${info.price}</div>
                        </div>
                        <div class="flex items-center gap-3 bg-white p-1 rounded-xl shadow-sm border">
                            <button onclick="changeCount('${n}',-1)" class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-red-500 font-bold">-</button>
                            <span class="text-sm font-black w-4 text-center">${info.count}</span>
                            <button onclick="changeCount('${n}',1)" class="w-8 h-8 flex items-center justify-center text-blue-600 font-bold">+</button>
                        </div>
                    </div>`;
            }
            
            const totalEl = document.getElementById('cart-total');
            if (totalEl) totalEl.innerText = total;

            const countEl = document.getElementById('cart-count');
            if (countEl) countEl.innerText = count;

            const modalTotalEl = document.getElementById('cart-modal-total');
            if (modalTotalEl) modalTotalEl.innerText = total;

            document.querySelectorAll('.price-btn').forEach(btn => {
                const itemName = btn.getAttribute('data-name');
                if (itemName && cart[itemName]) {
                    btn.classList.add('selected-btn');
                } else {
                    btn.classList.remove('selected-btn');
                }
            });
        }

        window.toggleCart = () => {
            const m = document.getElementById('cart-modal');
            const isOpen = m.style.display === 'flex';
            m.style.display = isOpen ? 'none' : 'flex';
            
            if (!isOpen) {
                const nameField = document.getElementById('cust-name');
                if (!nameField.value.trim()) {
                    nameField.classList.add('border-red-200');
                } else {
                    nameField.classList.remove('border-red-200', 'input-error');
                }
            }
        };

        window.showView = (v) => {
            if(v === 'admin' && !isAdminAuthenticated) {
                document.getElementById('login-modal').style.display = 'flex';
                return;
            }
            document.getElementById('order-view').classList.toggle('hidden', v !== 'order');
            document.getElementById('admin-view').classList.toggle('hidden', v !== 'admin');
            document.getElementById('success-view').classList.add('hidden');
            document.getElementById('main-footer').classList.toggle('hidden', v !== 'order');

            document.getElementById('nav-order').className = v === 'order' ? 'flex-1 py-4 tab-active text-blue-900' : 'flex-1 py-4 text-gray-400';
            document.getElementById('nav-admin').className = v === 'admin' ? 'flex-1 py-4 tab-active text-blue-900' : 'flex-1 py-4 text-gray-400';
        };

        window.checkAdmin = () => {
            const pw = document.getElementById('admin-pw').value;
            if(pw === '8888') {
                isAdminAuthenticated = true;
                document.getElementById('login-modal').style.display = 'none';
                showView('admin');
            } else {
                alert('密碼錯誤');
                document.getElementById('admin-pw').value = '';
            }
        };

        window.sendOrder = async () => {
            const nameField = document.getElementById('cust-name');
            const name = nameField.value.trim();
            const btn = document.getElementById('submit-btn');
            
            if(!name) {
                alert('⚠️ 下單失敗！\n\n請先在畫面最下方輸入您的「姓名或稱呼」，我們才知道餐點要送給誰喔！');
                toggleCart();
                nameField.focus();
                nameField.classList.add('input-error');
                setTimeout(() => nameField.classList.remove('input-error'), 1000);
                return;
            }

            if(Object.keys(cart).length === 0) return alert('您的購物車是空的');

            btn.innerText = "訂單傳送中...";
            btn.disabled = true;
            btn.classList.add('opacity-50');

            const items = Object.entries(cart).map(([n, i]) => ({ name: n, count: i.count, price: i.price }));
            const total = items.reduce((s, i) => s + (i.price * i.count), 0);
            
            try {
                let targetCollection;
                if (window.appId && window.appId !== 'blue-plate-official') {
                    targetCollection = collection(window.db, 'artifacts', window.appId, 'public', 'data', 'orders');
                } else {
                    targetCollection = collection(window.db, 'orders');
                }

                await addDoc(targetCollection, {
                    name, items, total, status: 'pending', timestamp: serverTimestamp()
                });
                
                const summary = items.map(i => `<div class="flex justify-between text-sm"><span>${i.name} x ${i.count}</span><span>$${i.price * i.count}</span></div>`).join('');
                document.getElementById('order-summary-box').innerHTML = `
                    <p class="font-bold text-slate-400 text-xs mb-2">訂單摘要：</p>
                    ${summary}
                    <div class="border-t pt-2 mt-2 flex justify-between font-black text-blue-900"><span>總金額</span><span>$${total}</span></div>
                `;

                document.getElementById('order-view').classList.add('hidden');
                document.getElementById('main-footer').classList.add('hidden');
                document.getElementById('success-view').classList.remove('hidden');
                
                cart = {}; updateCartUI(); toggleCart();
                nameField.value = '';
                nameField.classList.remove('input-error', 'border-red-200');
            } catch(e) { 
                console.error(e);
                alert('無法連線到資料庫！發送失敗。\n\n如果您已在 Netlify 上發佈，請確認是否填寫了正確的 Firebase API 金鑰。'); 
            } finally {
                btn.innerText = "確認下單";
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }
        };

        window.resetToOrder = () => {
            document.getElementById('success-view').classList.add('hidden');
            document.getElementById('order-view').classList.remove('hidden');
            document.getElementById('main-footer').classList.remove('hidden');
            window.scrollTo(0,0);
        };

        // ========== 後台管理邏輯 ==========

        window.updateStatus = async (id, status) => {
            try {
                let targetDoc;
                if (window.appId && window.appId !== 'blue-plate-official') {
                    targetDoc = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'orders', id);
                } else {
                    targetDoc = doc(window.db, 'orders', id);
                }
                await updateDoc(targetDoc, { status });
            } catch(e) {
                console.error('更新狀態失敗', e);
            }
        };

        // 刪除單筆訂單
        window.deleteOrder = async (id) => {
            if(!confirm("確定要刪除這筆訂單嗎？\n刪除後將無法復原！")) return;
            try {
                let targetDoc;
                if (window.appId && window.appId !== 'blue-plate-official') {
                    targetDoc = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'orders', id);
                } else {
                    targetDoc = doc(window.db, 'orders', id);
                }
                await deleteDoc(targetDoc);
            } catch(e) {
                console.error('刪除訂單失敗', e);
                alert('刪除失敗，請稍後再試。');
            }
        };

        window.clearAllOrders = async () => {
            if(!confirm("確定要清空所有訂單紀錄嗎？\n這將無法復原！")) return;
            try {
                let targetCol = (window.appId && window.appId !== 'blue-plate-official') 
                    ? collection(window.db, 'artifacts', window.appId, 'public', 'data', 'orders') 
                    : collection(window.db, 'orders');
                
                const snap = await getDocs(targetCol);
                snap.forEach(d => {
                    deleteDoc(d.ref).catch(err=>console.error(err));
                });
                alert("已成功清空所有訂單！");
            } catch(e) {
                console.error('清空失敗', e);
            }
        };

        // 匯出 CSV 檔案
        document.getElementById('export-excel-btn').addEventListener('click', () => {
            if(allOrders.length === 0) return alert('目前沒有任何訂單可以匯出');
            
            let csvContent = '\uFEFF'; // 加入 BOM 以支援 UTF-8 (Excel 才不會亂碼)
            csvContent += '訂單編號,稱呼/姓名,總金額,狀態,品項細節\n';
            
            allOrders.forEach(o => {
                let itemsStr = o.items.map(i => `${i.name} x ${i.count}`).join(' ; ');
                let statusStr = o.status === 'pending' ? '未處理' : (o.status === 'cooking' ? '製作中' : '已完成');
                // 將字串內的逗號取代，避免破壞 CSV 格式
                let safeName = o.name.replace(/,/g, ' ');
                csvContent += `${o.id},${safeName},${o.total},${statusStr},${itemsStr}\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `台東高商點餐紀錄_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // 產生 PDF 並列印
        window.printPDF = () => {
            if(allOrders.length === 0) return alert('目前沒有任何訂單可以列印');

            // 建立 A4 格式的純 HTML 表格
            let html = `
                <div style="font-size: 24px; font-weight: bold; text-align: center; margin-bottom: 20px;">台東高商 點餐明細</div>
                <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 14pt;">
                    <thead>
                        <tr>
                            <th style="border: 2px solid #000; padding: 10px; width: 25%;">姓名 / 單號</th>
                            <th style="border: 2px solid #000; padding: 10px; width: 55%;">品項</th>
                            <th style="border: 2px solid #000; padding: 10px; width: 20%; text-align: center;">數量</th>
                        </tr>
                    </thead>
            `;

            // 將同訂單的項目整理在一起，並將首格合併以貼近圖片效果
            allOrders.forEach(o => {
                // 將每筆訂單包在 tbody 中，可防止列印時剛好被切斷分頁
                html += `<tbody class="print-order-group">`;
                o.items.forEach((item, i) => {
                    html += `<tr>`;
                    if (i === 0) {
                        html += `<td style="border: 1px solid #000; padding: 10px; vertical-align: middle; text-align: center;" rowspan="${o.items.length}">
                                    <div style="font-weight: 900; font-size: 20pt; color: #000;">${o.name}</div>
                                    <div style="font-size: 12pt; color: #666; margin-top: 4px;">#${o.id.slice(-4)}</div>
                                 </td>`;
                    }
                    html += `<td style="border: 1px solid #000; padding: 10px;">${item.name}</td>`;
                    html += `<td style="border: 1px solid #000; padding: 10px; text-align: center; font-weight: bold;">${item.count}</td>`;
                    html += `</tr>`;
                });
                html += `</tbody>`;
            });

            html += `</table>`;
            
            // 寫入列印區塊並呼叫系統列印介面
            document.getElementById('print-area').innerHTML = html;
            window.print();
        };

        window.startOrderListener = () => {
            let targetCol = (window.appId && window.appId !== 'blue-plate-official') 
                ? collection(window.db, 'artifacts', window.appId, 'public', 'data', 'orders') 
                : collection(window.db, 'orders');

            onSnapshot(targetCol, (snap) => {
                allOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                // 照時間排序（新的在前面）
                allOrders.sort((a, b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0));
                renderAdmin();
            }, (error) => {
                console.error("監聽訂單失敗", error);
            });
        };

        function renderAdmin() {
            let rev = 0;
            let count = allOrders.length;
            let itemStats = {};
            let historyHtml = '';

            allOrders.forEach(o => {
                rev += o.total;
                o.items.forEach(i => {
                    if(!itemStats[i.name]) itemStats[i.name] = {count: 0, rev: 0};
                    itemStats[i.name].count += i.count;
                    itemStats[i.name].rev += (i.count * i.price);
                });

                let statusColor = o.status === 'pending' ? 'status-pending' : (o.status === 'cooking' ? 'status-cooking' : 'status-done');
                let statusText = o.status === 'pending' ? '未處理' : (o.status === 'cooking' ? '製作中' : '已完成');

                // 處理時間格式
                let timeStr = '';
                if (o.timestamp) {
                    let d = o.timestamp.toDate();
                    timeStr = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
                }

                historyHtml += `
                <div class="bg-white p-4 rounded-xl shadow-sm border mb-3">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold text-slate-800">${o.name} <span class="text-xs font-normal text-blue-600 bg-blue-50 px-1.5 py-0.5 rounded ml-2">🕒 ${timeStr}</span> <span class="text-xs text-gray-400 ml-1">#${o.id.slice(-4)}</span></span>
                        <span class="status-badge ${statusColor}">${statusText}</span>
                    </div>
                    <div class="text-sm text-gray-600 mb-3 space-y-1">
                        ${o.items.map(i => `<div class="flex justify-between"><span>${i.name} x ${i.count}</span><span>$${i.price * i.count}</span></div>`).join('')}
                    </div>
                    <div class="flex justify-between items-center pt-2 border-t">
                        <span class="font-black text-blue-900">$${o.total}</span>
                        <div class="space-x-2">
                            <button onclick="updateStatus('${o.id}', 'pending')" class="text-xs px-2 py-1 rounded bg-gray-100 hover:bg-gray-200 font-bold">未處理</button>
                            <button onclick="updateStatus('${o.id}', 'cooking')" class="text-xs px-2 py-1 rounded bg-green-100 text-green-700 hover:bg-green-200 font-bold">製作中</button>
                            <button onclick="updateStatus('${o.id}', 'done')" class="text-xs px-2 py-1 rounded bg-slate-200 text-slate-700 hover:bg-slate-300 font-bold">完成</button>
                            <button onclick="deleteOrder('${o.id}')" class="text-xs px-2 py-1 rounded bg-red-100 text-red-700 hover:bg-red-200 font-bold">刪除</button>
                        </div>
                    </div>
                </div>`;
            });

            document.getElementById('stat-revenue').innerText = '$' + rev;
            document.getElementById('stat-orders').innerText = count;
            document.getElementById('order-history').innerHTML = historyHtml;

            let sortedStats = Object.entries(itemStats).sort((a,b) => b[1].count - a[1].count);
            if(sortedStats.length > 0) {
                document.getElementById('stat-table-body').innerHTML = sortedStats.map(([n, s]) => `
                    <tr class="stat-row">
                        <td class="p-3 text-left font-medium">${n}</td>
                        <td class="p-3 text-center font-bold text-blue-700">${s.count}</td>
                        <td class="p-3 text-right text-slate-400">$${s.rev}</td>
                    </tr>
                `).join('');
            } else {
                document.getElementById('stat-table-body').innerHTML = `<tr><td colspan="3" class="p-8 text-center text-gray-400 italic">尚無統計數據</td></tr>`;
            }
        }

        // ========== 初始化流程 ==========
        initMenu();

        // Firebase 驗證機制
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch(e) {
                console.error("Firebase 驗證失敗", e);
            }
        };

        initAuth();

        onAuthStateChanged(auth, user => {
            if(user) {
                window.startOrderListener();
            }
        });

    </script>
</body>
</html>
